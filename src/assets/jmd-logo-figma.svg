<!--
Figma-friendly SVG template for JMD logo.
Layers and groups are named (use in Figma via File → Import or drag-and-drop).
Notes:
- Text elements are kept as text (editable in Figma if font is available).
- Groups are labeled with id/data-name for easy identification.
- Use Figma to adjust spacing, fonts, and colors interactively.
-->
<svg xmlns="http://www.w3.org/2000/svg" width="320" height="120" viewBox="0 0 320 120" role="img" aria-label="JMD Interior logo">
  <defs>
    <linearGradient id="g1" x1="0" x2="1">
      <stop offset="0%" stop-color="#b8862d"/>
      <stop offset="100%" stop-color="#f3d07a"/>
    </linearGradient>
    <style>
      /* Keep font families generic so Figma shows editable text; replace with Playfair/Georgia in Figma if needed */
      .jmd { font-family: Georgia, 'Times New Roman', serif; font-size: 64px; font-weight: 700; fill: url(#g1); }
      .interior { font-family: Arial, Helvetica, sans-serif; font-size: 16px; letter-spacing: 6px; fill: #222; }
    </style>
  </defs>

  <!-- Group: logo-frame -->
  <g id="logo-frame" data-name="logo-frame">

    <!-- Layer: roof -->
    <g id="roof" data-name="roof" transform="translate(24,8)">
      <!-- main roof stroke (triangle) -->
      <path id="roof-path" d="M16 72 L104 8 L192 72" fill="none" stroke="url(#g1)" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
    </g>

    <!-- Layer: dots (2x2) - editable group -->
    <g id="dots" data-name="dots" transform="translate(104,40)">
      <rect id="dot-1" x="-8" y="-8" width="12" height="12" rx="1" fill="url(#g1)"/>
      <rect id="dot-2" x="8" y="-8" width="12" height="12" rx="1" fill="url(#g1)" opacity="0.95"/>
      <rect id="dot-3" x="-8" y="8" width="12" height="12" rx="1" fill="url(#g1)" opacity="0.9"/>
      <rect id="dot-4" x="8" y="8" width="12" height="12" rx="1" fill="url(#g1)" opacity="0.85"/>
    </g>

    <!-- Layer: wordmark (editable text) -->
    <g id="wordmark" data-name="wordmark" transform="translate(0,64)">
      <!-- Centered text: x coordinate is the center of the viewBox (160) -->
      <text id="jmd-text" x="160" y="48" class="jmd" text-anchor="middle">JMD</text>
      <text id="interior-text" x="160" y="86" class="interior" text-anchor="middle">INTERIOR</text>
    </g>
  </g>
</svg>
